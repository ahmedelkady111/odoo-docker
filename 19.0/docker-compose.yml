services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo19-db-data:/var/lib/postgresql/data/pgdata
    restart: always

  web:
    build: .
    image: odoo-19:latest
    depends_on:
      - db
    ports:
      - "8072:8069"
    volumes:
      - odoo19-web-data:/var/lib/odoo
      - ./odoo.conf:/etc/odoo/odoo.conf
      - ./addons:/mnt/extra-addons
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    restart: always

volumes:
  odoo19-web-data:
  odoo19-db-data:
